<html>
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Coffee Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>COFFEE TIME</h1>
    </header>

    <main class="container">
        <div class="welcome-msg">
            <h3>Start your morning with a smile and a sip</h3>
        </div>

        <div class="banner">
            <img src="Main Coffee.jpg" alt="Our Special Coffee">
        </div>

        <div class="menu-grid">
            <div class="coffee-item">
                <img src="Ice Coffee.jpg" alt="Ice Coffee">
                <h3>Ice Coffee</h3>
            </div>
            
            <div class="coffee-item">
                <img src="Latte.jpg" alt="Latte">
                <h3>Latte</h3>
            </div>

            <div class="coffee-item">
                <img src="coffee.jpg" alt="Coffee">
                <h3>Classic Coffee</h3>
            </div>

            <div class="coffee-item">
                <img src="Espresso.jpg" alt="Espresso">
                <h3>Espresso</h3>
            </div>

            <div class="coffee-item">
                <img src="mocha.jpg" alt="Mocha">
                <h3>Mocha</h3>
            </div>

            <div class="coffee-item">
                <img src="Cappuccino.jpg" alt="Cappuccino">
                <h3>Cappuccino</h3>
            </div>
        </div>

        <div class="list-link-area">
            <a href="menu.html" class="menu-link-button">View Coffee List</a>
        </div>

        <div class="express-section">
            <a href="index.html" class="back-link">← Back to Register</a>
            <a href="form.html" class="back-link">sign Up with Us</a>
        </div>
    </main>

</body>
</html>
